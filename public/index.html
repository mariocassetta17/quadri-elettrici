<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>GEPB Configurator v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <aside id="sidebar">
        <h2 style="color: var(--accent)">GEPB GLOBAL</h2>
        <p style="font-size: 10px; color: #888; margin-bottom: 30px;">MULTINATIONAL INDUSTRIAL SYSTEMS</p>
        
        <div class="comp-item" onclick="creaPezzo('magneto', 35)">
            <div style="font-weight: bold;">Magnetotermico 16A</div>
            <div style="font-size: 12px; color: #aaa;">€ 35,00</div>
        </div>
        <div class="comp-item" onclick="creaPezzo('diff', 79)">
            <div style="font-weight: bold;">Differenziale 2P</div>
            <div style="font-size: 12px; color: #aaa;">€ 79,00</div>
        </div>
    </aside>

    <main id="canvas">
        <div id="quadro-esterno">
            <div id="piastra-interna">
                <div class="guida-din" id="din-1"></div>
                <div class="guida-din" id="din-2"></div>
                <div class="guida-din" id="din-3"></div>
            </div>
        </div>
    </main>

    <aside id="checkout">
        <h3>Riepilogo</h3>
        <div id="elenco-ordini" style="height: 400px; font-size: 14px;"></div>
        <hr>
        <div style="font-size: 24px; margin-top: 10px;">Totale: <span id="totale">€ 0.00</span></div>
        <button class="btn-buy">PRODUCI ORA</button>
        <p style="font-size: 10px; text-align: center; margin-top: 10px; color: #2ecc71;">✓ SPEDIZIONE GRATUITA INCLUSA</p>
    </aside>
</div>

<script src="script.js"></script>
</body>
</html>
