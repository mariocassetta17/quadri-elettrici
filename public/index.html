<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>GEPB | Global Electric Panel Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div style="font-weight: 900; font-size: 24px; color: #fbbf24;">GEPB GLOBAL</div>
        <div style="color: #22c55e;">FREE WORLDWIDE SHIPPING ACTIVE</div>
    </header>

    <div class="main-container">
        <aside id="sidebar">
            <h3>Componenti</h3>
            <div class="comp-card" onclick="aggiungiAlQuadro('Magnetotermico 16A', 45.00)">
                <b>Magnetotermico</b><br><small>€ 45,00</small>
            </div>
            <div class="comp-card" onclick="aggiungiAlQuadro('Differenziale', 95.50)">
                <b>Differenziale</b><br><small>€ 95,50</small>
            </div>
            <div class="comp-card" onclick="aggiungiAlQuadro('PLC Siemens', 520.00)">
                <b>PLC S7-1200</b><br><small>€ 520,00</small>
            </div>
        </aside>

        <main id="workspace">
            <div id="quadro-reale"></div>
        </main>

        <aside id="carrello">
            <h3>Il Tuo Ordine</h3>
            <div id="lista-pezzi"></div>
            <hr style="border: 0.5px solid #334155; margin: 20px 0;">
            <div style="font-size: 20px;">Totale: <span id="prezzo-totale" style="color:#22c55e;">€ 0,00</span></div>
            <button class="btn-order" onclick="alert('Ordine inviato alla produzione multinazionale!')">ORDINA ORA</button>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
